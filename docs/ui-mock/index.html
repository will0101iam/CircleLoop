<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>circleloop - UI Mocks</title>
    <style>
      :root {
        --bg: #0b0c10;
        --panel: rgba(17, 19, 24, 0.72);
        --text: #e8e9ee;
        --muted: #a7adbb;
        --border: rgba(255, 255, 255, 0.08);
        --accent: #7c5cff;
        --shadow: 0 12px 50px rgba(0, 0, 0, 0.45);
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: var(--sans);
        background: radial-gradient(1200px 600px at 18% 0%, rgba(124, 92, 255, 0.18), transparent 55%),
          radial-gradient(900px 500px at 82% 15%, rgba(45, 212, 191, 0.12), transparent 55%), var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px;
      }
      .head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(124, 92, 255, 0.18);
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
        margin-bottom: 12px;
      }
      .card h2 {
        margin: 0;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
        font-weight: 900;
      }
      .card .body {
        padding: 12px 14px;
        display: grid;
        gap: 10px;
      }
      a {
        color: var(--text);
        text-decoration: none;
        border: 1px solid var(--border);
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.18);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      a:hover {
        background: rgba(0, 0, 0, 0.24);
      }
      .desc {
        color: rgba(255, 255, 255, 0.62);
        font-size: 12px;
      }
      .path {
        font-family: var(--mono);
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head"><span class="dot"></span><span>circleloop UI Mocks</span></div>

      <div class="card">
        <h2>Mocks</h2>
        <div class="body">
          <a href="./run-ui.html">
            <div>
              <div>Run UI（单次 Run + Timeline + Inspector）</div>
              <div class="desc">偏 Claude Code：一键 Run，按 step 追加工具与结果</div>
            </div>
            <div class="path">run-ui.html</div>
          </a>
          <a href="./ide-ui.html">
            <div>
              <div>IDE UI（Chat × Code × Runs × Diff）</div>
              <div class="desc">偏 Cursor/Mira：左侧会话，中间多 tab，右侧 Inspector</div>
            </div>
            <div class="path">ide-ui.html</div>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
